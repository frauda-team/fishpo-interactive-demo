<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outlook — Inbox</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue:         #0078d4;
      --blue-dark:    #005a9e;
      --blue-hover:   #106ebe;
      --blue-light:   #deecf9;
      --blue-lighter: #eff6fc;
      --sidebar-bg:   #f5f5f5;
      --border:       #e1dfdd;
      --list-bg:      #ffffff;
      --reading-bg:   #ffffff;
      --txt:          #201f1e;
      --txt2:         #605e5c;
      --txt3:         #a19f9d;
      --hover-bg:     #f3f2f1;
      --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    html, body { height: 100%; font-family: var(--font); color: var(--txt); overflow: hidden; }

    /* ── App shell ─────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* Top bar */
    .topbar {
      height: 48px;
      background: var(--blue);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      flex-shrink: 0;
      user-select: none;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 9px;
      color: white; font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
    }

    /* ── Three-column layout ───────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      padding: 8px 0;
      overflow-y: auto;
    }
    .sidebar-section {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--txt3);
      padding: 14px 16px 5px;
    }
    .folder {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 12px; margin: 1px 5px;
      border-radius: 5px; cursor: default; font-size: 13.5px;
      color: var(--txt); user-select: none;
    }
    .folder.active { background: var(--blue-light); color: var(--blue); font-weight: 600; }
    .folder svg { flex-shrink: 0; opacity: .85; }
    .folder-label { flex: 1; }
    .badge {
      background: var(--blue); color: white;
      font-size: 11px; font-weight: 700; border-radius: 12px;
      padding: 1px 7px; min-width: 22px; text-align: center;
    }

    /* ── Email list ────────────────────────────────────── */
    .list-col {
      width: 340px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--list-bg);
    }
    .list-head {
      padding: 14px 16px 10px;
      font-size: 20px; font-weight: 600;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--list-bg);
    }
    .email-list { flex: 1; overflow-y: auto; }

    /* Email row */
    .email-row {
      display: flex; align-items: flex-start;
      padding: 11px 14px 11px 22px;
      gap: 11px; border-bottom: 1px solid var(--border);
      cursor: pointer; position: relative;
      transition: background 80ms;
    }
    .email-row:hover { background: var(--hover-bg); }
    .email-row.selected { background: var(--blue-light); }
    .email-row.selected::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--blue); border-radius: 0 2px 2px 0;
    }
    .unread-dot {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      width: 7px; height: 7px; border-radius: 50%; background: var(--blue);
    }

    /* Avatar circle */
    .av {
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 13px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    /* Row text */
    .row-body { flex: 1; min-width: 0; }
    .row-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .row-sender { font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-row.unread .row-sender { font-weight: 700; }
    .row-time { font-size: 11px; color: var(--txt3); flex-shrink: 0; }
    .email-row.unread .row-time { color: var(--blue); font-weight: 600; }
    .row-subject {
      font-size: 13px; color: var(--txt2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .email-row.unread .row-subject { font-weight: 700; color: var(--txt); }
    .row-snippet {
      font-size: 12px; color: var(--txt3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Reading pane ──────────────────────────────────── */
    .reading {
      flex: 1; overflow-y: auto;
      background: var(--reading-bg);
    }
    .reading-inner { padding: 28px 36px; max-width: 800px; }

    .empty-state {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
    }
    .empty-state svg { opacity: .25; }
    .empty-state span { font-size: 14px; color: var(--txt3); }

    .msg-subject { font-size: 22px; font-weight: 600; line-height: 1.3; margin-bottom: 20px; }
    .msg-meta { display: flex; align-items: center; gap: 13px; margin-bottom: 20px; }
    .msg-av {
      width: 42px; height: 42px; border-radius: 50%;
      font-size: 14px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .msg-info { flex: 1; }
    .msg-name { font-size: 14px; font-weight: 600; }
    .msg-addr { font-size: 12px; color: var(--txt2); margin-top: 1px; }
    .msg-date { font-size: 12px; color: var(--txt3); white-space: nowrap; }
    .msg-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* Email body typography */
    .msg-body { font-size: 14.5px; line-height: 1.65; color: var(--txt); }
    .msg-body p { margin-bottom: 14px; }
    .msg-body h3 { font-size: 15px; font-weight: 600; margin: 18px 0 8px; color: var(--txt); }
    .msg-body ul, .msg-body ol { padding-left: 22px; margin-bottom: 14px; }
    .msg-body li { margin-bottom: 5px; }
    .msg-body strong { font-weight: 600; }
    .msg-body .callout {
      background: var(--blue-lighter);
      border-left: 3px solid var(--blue);
      padding: 13px 16px; margin-bottom: 16px;
      border-radius: 0 5px 5px 0; font-size: 13.5px; line-height: 1.6;
    }
    .msg-body table {
      border-collapse: collapse; width: 100%; margin-bottom: 16px;
      font-size: 13px;
    }
    .msg-body td, .msg-body th {
      padding: 8px 12px; border: 1px solid var(--border); text-align: left;
    }
    .msg-body th { background: var(--hover-bg); font-weight: 600; }
    .msg-body .sig {
      color: var(--txt2); font-size: 13px;
      border-top: 1px solid var(--border);
      padding-top: 14px; margin-top: 20px; line-height: 1.7;
    }

    /* Back button — mobile only */
    .back-btn {
      display: none; align-items: center; gap: 6px;
      color: var(--blue); font-size: 14px; font-weight: 500;
      padding: 6px 0 18px; cursor: pointer;
      background: none; border: none; font-family: var(--font);
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 960px) { .sidebar { display: none; } }

    @media (max-width: 640px) {
      .list-col { width: 100%; border-right: none; }
      .reading {
        display: none; position: fixed;
        inset: 48px 0 0 0; z-index: 30;
        overflow-y: auto; background: var(--reading-bg);
      }
      .reading.open { display: block; }
      .reading-inner { padding: 16px 18px; }
      .back-btn { display: flex; }
    }
  </style>
</head>

// ── State ──────────────────────────────────────────────
let selectedId = null;

// ── Render list ────────────────────────────────────────
function renderList() {
  const el = document.getElementById('emailList');
  el.innerHTML = emails.map(e => `
    <div class="email-row${e.unread ? ' unread' : ''}${selectedId === e.id ? ' selected' : ''}"
         onclick="openEmail(${e.id})">
      ${e.unread ? '<div class="unread-dot"></div>' : ''}
      <div class="av" style="background:${e.color}">${e.initials}</div>
      <div class="row-body">
        <div class="row-top">
          <span class="row-sender">${e.from}</span>
          <span class="row-time">${e.time}</span>
        </div>
        <div class="row-subject">${e.subject}</div>
        <div class="row-snippet">${e.snippet}</div>
      </div>
    </div>
  `).join('');

  // Update unread badge
  const unreadCount = emails.filter(e => e.unread).length;
  const badge = document.getElementById('unreadBadge');
  if (unreadCount > 0) { badge.textContent = unreadCount; badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

      <div class="msg-av" style="background:${e.color}">${e.initials}</div>
      <div class="msg-info">
        <div class="msg-name">${e.from} <span style="font-weight:400;color:var(--txt2);font-size:12px;">&lt;${e.email}&gt;</span></div>
        <div class="msg-addr">To: me</div>
      </div>
      <div class="msg-date">${e.fullDate}</div>
    </div>
    <hr class="msg-divider">
    <div class="msg-body">${e.body}</div>
  `;

  // Mobile: slide in reading pane
  if (window.innerWidth <= 640) {
    document.getElementById('readingPane').classList.add('open');
  }

  renderList();
}

// ── Close reading (mobile) ─────────────────────────────
function closeReading() {
  document.getElementById('readingPane').classList.remove('open');
}

// ── Init ───────────────────────────────────────────────
renderList();
</script>
</body>
</html>
